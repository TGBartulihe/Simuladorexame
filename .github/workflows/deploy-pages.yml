name: Deploy to GitHub Pages

# Roda automaticamente a cada push na branch principal que toque a pasta
# app/ (não builda de novo só porque você mudou um script Python, por
# exemplo). Também pode ser disparado manualmente na aba Actions.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita dois deploys rodando ao mesmo tempo — se você fizer dois pushes
# rápidos, o mais recente cancela o anterior em vez de os dois disputarem.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build de produção
        working-directory: app
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato do build
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite gera o build em app/dist por padrão
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
